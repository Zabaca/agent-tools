[install]
# Mark optional NestJS dependencies as external to reduce bundle size
[install.optionalDependencies]
optional = true

[bundle]
# External dependencies that shouldn't be bundled
external = [
  "@nestjs/microservices",
  "@nestjs/websockets",
  "@nestjs/platform-socket.io",
  "socket.io",
  "nats",
  "mqtt",
  "kafkajs",
  "@grpc/grpc-js",
  "redis",
  "ioredis"
]
